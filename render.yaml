services:
  - type: web
    name: victoriaeventos-api
    runtime: python
    plan: starter  # Cambiar a 'free' si prefieres el plan gratuito (con cold starts)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URL
        sync: false  # Se configura manualmente en el dashboard (es secreta)
      - key: DB_NAME
        value: victoria_eventos_db
      - key: JWT_SECRET
        generateValue: true  # Render genera una clave aleatoria segura automáticamente
      - key: OPENAI_API_KEY
        sync: false  # Se configura manualmente en el dashboard (es secreta)
      - key: CORS_ORIGINS
        sync: false  # Se configura tras desplegar el frontend
